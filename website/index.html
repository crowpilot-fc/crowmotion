<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>crowpilot</title>
<meta name="description" content="Open-source FPV projects.">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Ccircle%20cx='16'%20cy='16'%20r='13'%20fill='none'%20stroke='%230b0b0c'%20stroke-width='3'/%3E%3Ccircle%20cx='16'%20cy='16'%20r='4'%20fill='%23e5383b'/%3E%3C/svg%3E">
<style>
  body { margin: 0; background: #f5f5f7; color: #0b0b0c;
    font-family: -apple-system, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .wrap { text-align: center; padding: 24px; }
  .mark { width: 34px; height: 34px; border-radius: 50%; border: 3px solid #0b0b0c;
    display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px; }
  .mark span { width: 9px; height: 9px; border-radius: 50%; background: #e5383b; }
  h1 { font-family: 'Futura','Avenir Next','Century Gothic',system-ui,sans-serif;
    font-size: 24px; margin: 0 0 18px; font-weight: 800; }
  a.card { display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
    background: #fff; border: 1px solid #ececef; border-radius: 13px; padding: 14px 22px;
    color: #0b0b0c; font-weight: 600; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,.03); }
  a.card:hover { background: #fafafa; }
  a.card .dot { width: 7px; height: 7px; border-radius: 50%; background: #e5383b; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark"><span></span></div>
    <h1>crowpilot</h1>
    <a class="card" href="/crowmotion/"><span class="dot"></span>CrowMotion - a $5 wireless FPV head tracker</a>
  </div>
</body>
</html>
