# Deploy the public website (crowpilot.in) to Cloudflare Pages whenever the
# site source changes, and on every release.
#
# The site is currently a single "coming soon" holding page; the product
# pages were removed (recoverable from git history) and a _redirects
# catch-all sends every old URL to the holding page. When the product pages
# come back, restore the version-stamp step that used to live here.
name: deploy-website

on:
  push:
    branches: [main]
    paths: ['website/**']
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 2fca98f9bd732794c53117b67c5b4593
          command: pages deploy website --project-name crowpilot --branch main
