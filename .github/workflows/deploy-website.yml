# Deploy the public website (crowpilot.in) to Cloudflare Pages whenever the
# site source changes, and on every release. The product-page version pill is
# stamped from the latest release tag at deploy time, so it can never go stale
# again (the value hardcoded in the source is just a placeholder).
name: deploy-website

on:
  push:
    branches: [main]
    paths: ['website/**']
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4.2.1
        with:
          fetch-depth: 0 # need tags to find the latest release

      - name: Stamp latest release version into the product page
        run: |
          VER=$(git tag -l 'v*' | sort -V | tail -1)
          VER="${VER#v}"
          if [ -n "$VER" ]; then
            sed -i "s#>v[0-9]\+\.[0-9]\+\.[0-9]\+</span>#>v${VER}</span>#" \
              website/crowmotion/index.html
            echo "stamped v$VER into the product page"
          else
            echo "no release tag yet; leaving the placeholder version"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 2fca98f9bd732794c53117b67c5b4593
          command: pages deploy website --project-name crowpilot --branch main
